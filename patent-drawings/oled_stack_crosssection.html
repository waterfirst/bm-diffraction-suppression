<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLED 디스플레이 풀스택 단면도 — BM 회절 억제 구조 통합</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Segoe UI', Arial, sans-serif;
    background: #f4f4f4;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: #555;
    margin-bottom: 16px;
  }
  .drawing-container {
    background: #fff;
    border: 2px solid #222;
    padding: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  nav {
    margin-bottom: 12px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  nav button {
    padding: 5px 14px;
    font-size: 12px;
    border: 1px solid #888;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  nav button:hover { background: #eee; }
  nav button.active { background: #333; color: #fff; }
  .info-bar {
    margin-top: 10px;
    font-size: 11px;
    color: #777;
    text-align: center;
  }

  @media print {
    body { background: #fff; padding: 0; }
    nav, .info-bar { display: none; }
    .drawing-container { border: none; box-shadow: none; padding: 0; }
    svg { width: 100% !important; height: auto !important; }
  }
</style>
</head>
<body>

<h1>OLED 디스플레이 풀스택 단면도 &mdash; BM 회절 억제 구조 통합</h1>
<p class="subtitle">Patent Drawing &mdash; Full-Stack Cross-Section with BM Diffraction Suppression Structure</p>

<nav>
  <button onclick="window.print()">Print / PDF</button>
  <button onclick="toggleLabels()">Toggle Labels</button>
  <button onclick="highlightKey()">Highlight Key Layer</button>
</nav>

<div class="drawing-container">
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" id="mainSvg">
<defs>
  <!-- Grid pattern -->
  <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
  </pattern>

  <!-- Nano diffuser dot pattern -->
  <pattern id="nanoDots" width="12" height="12" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="3" r="1" fill="#2a4a6a" opacity="0.7"/>
    <circle cx="8" cy="1" r="0.8" fill="#2a4a6a" opacity="0.5"/>
    <circle cx="5" cy="7" r="1.1" fill="#2a4a6a" opacity="0.6"/>
    <circle cx="10" cy="9" r="0.9" fill="#2a4a6a" opacity="0.55"/>
    <circle cx="1" cy="10" r="0.7" fill="#2a4a6a" opacity="0.45"/>
  </pattern>

  <!-- Hatching for cathode reflection -->
  <pattern id="reflectionHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="6" stroke="#666" stroke-width="0.6" opacity="0.5"/>
  </pattern>

  <!-- TFT transistor symbol pattern -->
  <pattern id="tftPattern" width="40" height="18" patternUnits="userSpaceOnUse">
    <rect width="40" height="18" fill="#b8b0a8"/>
    <line x1="10" y1="4" x2="10" y2="14" stroke="#555" stroke-width="1"/>
    <line x1="12" y1="5" x2="12" y2="13" stroke="#555" stroke-width="0.8"/>
    <line x1="14" y1="7" x2="20" y2="7" stroke="#555" stroke-width="0.8"/>
    <line x1="14" y1="11" x2="20" y2="11" stroke="#555" stroke-width="0.8"/>
    <line x1="20" y1="4" x2="20" y2="14" stroke="#555" stroke-width="0.8"/>
    <line x1="20" y1="9" x2="28" y2="9" stroke="#555" stroke-width="0.8"/>
    <circle cx="30" cy="9" r="2" fill="none" stroke="#555" stroke-width="0.6"/>
  </pattern>

  <!-- Cover glass gradient -->
  <linearGradient id="coverGlassGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8e8e8"/>
    <stop offset="50%" stop-color="#d0d0d0"/>
    <stop offset="100%" stop-color="#c0c0c0"/>
  </linearGradient>

  <!-- OLED organic gradient -->
  <linearGradient id="oledGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9b59b6"/>
    <stop offset="25%" stop-color="#8e44ad"/>
    <stop offset="50%" stop-color="#6a3d9a"/>
    <stop offset="75%" stop-color="#4a69bd"/>
    <stop offset="100%" stop-color="#3b5998"/>
  </linearGradient>

  <!-- Cathode metallic gradient -->
  <linearGradient id="cathodeGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#555"/>
    <stop offset="40%" stop-color="#333"/>
    <stop offset="100%" stop-color="#222"/>
  </linearGradient>

  <!-- PI substrate gradient -->
  <linearGradient id="piGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c8923a"/>
    <stop offset="100%" stop-color="#a0702a"/>
  </linearGradient>

  <!-- Arrow markers -->
  <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#ff6600"/>
  </marker>
  <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#2266cc"/>
  </marker>
  <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
    <path d="M8,0 L0,3 L8,6 Z" fill="#22aa44"/>
  </marker>
  <marker id="arrowBlack" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
    <path d="M0,0 L6,2 L0,4 Z" fill="#333"/>
  </marker>
  <marker id="arrowBlackUp" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
    <path d="M6,0 L0,2 L6,4 Z" fill="#333"/>
  </marker>

  <!-- Encapsulation subtle gradient -->
  <linearGradient id="encapGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c8d8e8"/>
    <stop offset="100%" stop-color="#b0c4d8"/>
  </linearGradient>

</defs>

<!-- Background grid -->
<rect width="900" height="700" fill="white"/>
<rect width="900" height="700" fill="url(#gridPattern)"/>

<!-- ============================================================ -->
<!-- LAYER STACK: x=80..680 (width=600), labels on left           -->
<!-- ============================================================ -->
<g id="layerStack">

  <!-- LAYER 1: Cover Glass (0.5T) -->
  <g id="layer1">
    <rect x="80" y="32" width="600" height="36" fill="url(#coverGlassGrad)" stroke="#888" stroke-width="1.2"/>
    <text x="72" y="54" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(1)</text>
    <text x="690" y="46" font-size="9.5" fill="#333">커버 글래스 (Cover Glass)</text>
    <text x="690" y="58" font-size="8" fill="#777">0.5T, Chemically Strengthened</text>
  </g>

  <!-- LAYER 2: OCA -->
  <g id="layer2">
    <rect x="80" y="68" width="600" height="20" fill="#ffe8c8" stroke="#c8a878" stroke-width="1"/>
    <text x="72" y="82" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(2)</text>
    <text x="690" y="82" font-size="9.5" fill="#333">OCA 광학 접착층</text>
  </g>

  <!-- LAYER 3: Touch Sensor -->
  <g id="layer3">
    <rect x="80" y="88" width="600" height="22" fill="#d8e8d8" stroke="#88a888" stroke-width="1"/>
    <!-- ITO mesh lines -->
    <line x1="120" y1="92" x2="120" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="180" y1="92" x2="180" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="240" y1="92" x2="240" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="300" y1="92" x2="300" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="360" y1="92" x2="360" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="420" y1="92" x2="420" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="480" y1="92" x2="480" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>
    <line x1="540" y1="92" x2="540" y2="106" stroke="#88b888" stroke-width="0.6" opacity="0.5"/>

    <line x1="85" y1="99" x2="675" y2="99" stroke="#88b888" stroke-width="0.5" opacity="0.4"/>
    <text x="72" y="103" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(3)</text>
    <text x="690" y="103" font-size="9.5" fill="#333">터치 센서 (ITO/Metal Mesh)</text>
  </g>

  <!-- LAYER 4: Planarization -->
  <g id="layer4">
    <rect x="80" y="110" width="600" height="16" fill="#f0e8d8" stroke="#c8b898" stroke-width="1"/>
    <text x="72" y="122" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(4)</text>
    <text x="690" y="122" font-size="9.5" fill="#333">평탄화층 (Planarization)</text>
  </g>

  <!-- ======================================================== -->
  <!-- LAYER 5: BM + Phase Modulation Film [KEY INVENTION]      -->
  <!-- ======================================================== -->
  <g id="layer5_key">
    <!-- Highlight border (dashed copper) -->
    <rect x="74" y="124" width="612" height="50" fill="none"
          stroke="#c87533" stroke-width="2.5" stroke-dasharray="8,4" rx="3"/>

    <!-- Base slit (open area) background -->
    <rect x="80" y="126" width="600" height="46" fill="#f5e8a0" stroke="#888" stroke-width="1"/>

    <!-- Nano diffuser dots across entire layer -->
    <rect x="80" y="126" width="600" height="46" fill="url(#nanoDots)" opacity="0.4"/>

    <!-- BM bars (5 pixel openings = 6 BM bars at edges + between) -->
    <!-- BM bar 0: left edge -->
    <rect x="80"  y="126" width="30" height="46" fill="#1a1a1a"/>
    <rect x="80"  y="126" width="30" height="46" fill="url(#nanoDots)" opacity="0.3"/>

    <!-- Pixel opening 1 with checkerboard phase -->
    <rect x="110" y="126" width="90" height="46" fill="#f5e8a0"/>
    <!-- Checkerboard phase regions -->
    <rect x="110" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="155" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="132" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="177" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <!-- Nano dots in opening -->
    <rect x="110" y="126" width="90" height="46" fill="url(#nanoDots)" opacity="0.35"/>

    <!-- BM bar 1 -->
    <rect x="200" y="126" width="28" height="46" fill="#1a1a1a"/>
    <rect x="200" y="126" width="28" height="46" fill="url(#nanoDots)" opacity="0.25"/>

    <!-- Pixel opening 2 with checkerboard -->
    <rect x="228" y="126" width="90" height="46" fill="#f5e8a0"/>
    <rect x="228" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="273" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="250" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="295" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="228" y="126" width="90" height="46" fill="url(#nanoDots)" opacity="0.35"/>

    <!-- BM bar 2 -->
    <rect x="318" y="126" width="28" height="46" fill="#1a1a1a"/>
    <rect x="318" y="126" width="28" height="46" fill="url(#nanoDots)" opacity="0.25"/>

    <!-- Pixel opening 3 with checkerboard -->
    <rect x="346" y="126" width="90" height="46" fill="#f5e8a0"/>
    <rect x="346" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="391" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="368" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="413" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="346" y="126" width="90" height="46" fill="url(#nanoDots)" opacity="0.35"/>

    <!-- BM bar 3 -->
    <rect x="436" y="126" width="28" height="46" fill="#1a1a1a"/>
    <rect x="436" y="126" width="28" height="46" fill="url(#nanoDots)" opacity="0.25"/>

    <!-- Pixel opening 4 with checkerboard -->
    <rect x="464" y="126" width="90" height="46" fill="#f5e8a0"/>
    <rect x="464" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="509" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="486" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="531" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="464" y="126" width="90" height="46" fill="url(#nanoDots)" opacity="0.35"/>

    <!-- Pixel opening 5 with checkerboard -->
    <!-- BM bar 4 -->
    <rect x="554" y="126" width="28" height="46" fill="#1a1a1a"/>
    <rect x="554" y="126" width="28" height="46" fill="url(#nanoDots)" opacity="0.25"/>

    <rect x="582" y="126" width="68" height="46" fill="#f5e8a0"/>
    <rect x="582" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="627" y="126" width="22" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="604" y="149" width="23" height="23" fill="#5a7fb0" opacity="0.55"/>
    <rect x="582" y="126" width="68" height="46" fill="url(#nanoDots)" opacity="0.35"/>

    <!-- BM bar 5: right edge -->
    <rect x="650" y="126" width="30" height="46" fill="#1a1a1a"/>
    <rect x="650" y="126" width="30" height="46" fill="url(#nanoDots)" opacity="0.25"/>

    <!-- Layer border -->
    <rect x="80" y="126" width="600" height="46" fill="none" stroke="#888" stroke-width="1"/>

    <!-- Layer label -->
    <text x="72" y="153" text-anchor="end" font-size="10" fill="#c87533" font-weight="bold">(5)</text>
    <text x="690" y="140" font-size="9.5" fill="#c87533" font-weight="bold">블랙 매트릭스 + 위상변조막</text>
    <text x="690" y="152" font-size="8.5" fill="#c87533">[핵심 발명 / Key Invention]</text>
    <text x="690" y="164" font-size="8" fill="#999">Checkerboard Phase + Nano Diffuser</text>
  </g>

  <!-- LAYER 6: Color Filter (R/G/B) aligned with pixel openings -->
  <g id="layer6">
    <rect x="80" y="172" width="600" height="28" fill="#e8e0d0" stroke="#aaa" stroke-width="1"/>
    <!-- R -->
    <rect x="118" y="174" width="74" height="24" fill="#ff4444" opacity="0.5" rx="1"/>
    <text x="155" y="190" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">R</text>
    <!-- G -->
    <rect x="236" y="174" width="74" height="24" fill="#44cc44" opacity="0.5" rx="1"/>
    <text x="273" y="190" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">G</text>
    <!-- B -->
    <rect x="354" y="174" width="74" height="24" fill="#4444ff" opacity="0.5" rx="1"/>
    <text x="391" y="190" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">B</text>
    <!-- R -->
    <rect x="472" y="174" width="74" height="24" fill="#ff4444" opacity="0.5" rx="1"/>
    <text x="509" y="190" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">R</text>
    <!-- G -->
    <rect x="586" y="174" width="60" height="24" fill="#44cc44" opacity="0.5" rx="1"/>
    <text x="616" y="190" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">G</text>

    <text x="72" y="190" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(6)</text>
    <text x="690" y="190" font-size="9.5" fill="#333">컬러 필터 (Color Filter R/G/B)</text>
  </g>

  <!-- LAYER 7: Overcoat -->

    <rect x="80" y="200" width="600" height="12" fill="#e8e0d0" stroke="#b8a888" stroke-width="0.8"/>
    <text x="72" y="210" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(7)</text>
    <text x="690" y="210" font-size="9.5" fill="#333">오버코트 (Overcoat)</text>
  </g>

  <!-- LAYER 8: ITO Anode -->
  <g id="layer8">
    <rect x="80" y="212" width="600" height="10" fill="#a8a8a8" stroke="#888" stroke-width="0.8"/>
    <!-- ITO sheen -->
    <rect x="80" y="212" width="600" height="4" fill="#c0c0c0" opacity="0.4"/>
    <text x="72" y="221" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(8)</text>
    <text x="690" y="221" font-size="9.5" fill="#333">ITO 양극 (Anode)</text>
  </g>

  <!-- LAYER 9: OLED Organic Layers (HIL/HTL/EML/ETL/EIL) -->
  <g id="layer9">
    <!-- Full organic stack -->
    <rect x="80" y="222" width="600" height="60" fill="url(#oledGrad)" stroke="#555" stroke-width="1"/>

    <!-- Sub-layer dividers -->
    <!-- HIL (thin ~6px) -->
    <line x1="80" y1="228" x2="680" y2="228" stroke="#fff" stroke-width="0.4" opacity="0.5"/>
    <text x="84" y="227" font-size="6.5" fill="#ddd">HIL</text>
    <!-- HTL (~12px) -->
    <line x1="80" y1="240" x2="680" y2="240" stroke="#fff" stroke-width="0.4" opacity="0.5"/>

    <!-- EML (thickest ~20px) -->

    <rect x="370" y="243" width="60" height="14" fill="#ff0" opacity="0.08" rx="4"/>
    <rect x="490" y="243" width="60" height="14" fill="#ff0" opacity="0.08" rx="4"/>
    <!-- ETL (~12px) -->
    <line x1="80" y1="272" x2="680" y2="272" stroke="#fff" stroke-width="0.4" opacity="0.5"/>
    <text x="84" y="268" font-size="6.5" fill="#ddd">ETL</text>
    <!-- EIL (thin ~6px) -->
    <text x="84" y="279" font-size="6.5" fill="#ddd">EIL</text>

    <text x="72" y="255" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(9)</text>
    <text x="690" y="248" font-size="9.5" fill="#333">OLED 유기층</text>
    <text x="690" y="260" font-size="8" fill="#777">(HIL/HTL/EML/ETL/EIL)</text>

  <!-- LAYER 10: Metal Cathode -->
  <g id="layer10">
    <rect x="80" y="282" width="600" height="18" fill="url(#cathodeGrad)" stroke="#333" stroke-width="1"/>
    <!-- Reflection hatching -->
    <rect x="80" y="282" width="600" height="18" fill="url(#reflectionHatch)" opacity="0.3"/>
    <text x="72" y="295" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(10)</text>
    <text x="690" y="295" font-size="9.5" fill="#333">금속 음극 (Cathode)</text>
    <text x="690" y="305" font-size="8" fill="#777">Al/Ag, Reflective</text>
  </g>

  <!-- LAYER 11: Encapsulation (TFE) -->
  <g id="layer11">
    <rect x="80" y="300" width="600" height="20" fill="url(#encapGrad)" stroke="#8899aa" stroke-width="1"/>
    <text x="72" y="314" text-anchor="end" font-size="10" fill="#333" font-weight="bold">(11)</text>
    <text x="690" y="314" font-size="9.5" fill="#333">봉지층 (Encapsulation, TFE)</text>
  </g>

  <!-- LAYER 12: TFT Layer -->
  <g id="layer12">
    <rect x="80" y="320" width="600" height="26" fill="url(#tftPattern)" stroke="#777" stroke-width="1"/>

    <text x="690" y="363" font-size="9.5" fill="#333">PI 기판 (Polyimide Substrate)</text>
    <text x="690" y="374" font-size="8" fill="#777">Flexible Base, Amber</text>
  </g>

<script>
let labelsVisible = true;
function toggleLabels() {
  labelsVisible = !labelsVisible;
  const texts = document.querySelectorAll('#mainSvg text');
  texts.forEach(t => {
    // Keep figure number and legend always visible
    const parent = t.closest('#legend') || t.closest('#callout');
    if (!parent && t.getBBox().y < 480) {
      t.style.opacity = labelsVisible ? '1' : '0';
    }
  });
}

let highlighted = false;
function highlightKey() {
  highlighted = !highlighted;
  const keyLayer = document.getElementById('layer5_key');
  if (highlighted) {
    keyLayer.style.filter = 'drop-shadow(0 0 8px #c87533) drop-shadow(0 0 16px rgba(200,117,51,0.4))';
    keyLayer.style.transition = 'filter 0.3s';
  } else {
    keyLayer.style.filter = 'none';
  }
}
</script>
